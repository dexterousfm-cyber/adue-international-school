<!DOCTYPE html>
<html>
<head>
    <title>Students - ADUE Portal</title>
</head>
<body>
<h1>Students</h1>
<button onclick="window.location.href='dashboard.html'">Back to Dashboard</button>

<div id="studentList"></div>

<script>
let loggedIn = JSON.parse(localStorage.getItem("loggedInUser"));
if(!loggedIn || loggedIn.role !== "admin"){ alert("Access denied!"); window.location.href="login.html"; }

let users = JSON.parse(localStorage.getItem("users")) || [];
let students = users.filter(u=>u.role==="student");

let div = document.getElementById("studentList");
students.forEach(s=>{
    let p = document.createElement("p");
    p.innerText = `${s.name} | ${s.email}`;
    div.appendChild(p);
});
</script>

</body>
</html>
