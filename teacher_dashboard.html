<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:#f5f5f5; }
.header { display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:#800000; color:white; }
.header .logo img { width:120px; height:auto; object-fit:contain; }
.header .profile { display:flex; align-items:center; gap:10px; }
.header .profile img { width:40px; height:40px; border-radius:50%; border:1px solid white; object-fit:cover; }
.header .profile span { font-weight:bold; }
.container { padding:30px; }
button { padding:8px 16px; margin:5px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
button.primary { background:#800000; color:white; }
button.primary:hover { background:#a00000; }
table { width:100%; border-collapse:collapse; margin-top:20px; background:white; box-shadow:0 2px 5px rgba(0,0,0,0.15); }
th, td { padding:12px; text-align:center; border:1px solid #ddd; }
th { background:#800000; color:white; }
table tr:hover { background:#fff2f2; }
img.avatar-small { width:50px; height:50px; border-radius:50%; object-fit:cover; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="logo"><img src="logo-new.png" alt="Logo"></div>
    <div class="profile">
        <img src="teacher.png" alt="Teacher" id="teacherPic">
        <span id="teacherName">Welcome Teacher</span>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">
    <h2>Your Students</h2>
    <table id="studentsTable"></table>
</div>

<script>
// Load all students and teachers
let students = JSON.parse(localStorage.getItem('students')) || [];
let teachers = JSON.parse(localStorage.getItem('teachers')) || [];

// Get current teacher
let teacherIndex = localStorage.getItem('currentTeacherIndex');
if(teacherIndex === null){
    alert("No teacher logged in!");
    window.location.href = "index.html";
}
let currentTeacher = teachers[teacherIndex];

// Show teacher info
document.getElementById('teacherName').textContent = "Welcome " + currentTeacher.name;
document.getElementById('teacherPic').src = currentTeacher.profilePicture || 'teacher.png';

// Render students
function renderStudents(){
    const table = document.getElementById('studentsTable');
    let html = `<tr>
        <th>Picture</th>
        <th>Name</th>
        <th>Email</th>
        <th>Student ID</th>
        <th>Class</th>
        <th>Year</th>
    </tr>`;

    // Optional: filter students assigned to this teacher
    // let myStudents = students.filter(s => s.teacherID === currentTeacher.teacherID);
    let myStudents = students; // show all students registered by admin

    myStudents.forEach(s => {
        html += `<tr>
            <td><img src="${s.profilePicture || 'student.png'}" class="avatar-small"></td>
            <td>${s.name}</td>
            <td>${s.email}</td>
            <td>${s.studentID}</td>
            <td>${s.studentClass || '-'}</td>
            <td>${s.studentYear || '-'}</td>
        </tr>`;
    });
    table.innerHTML = html;
}

// Logout
function logout(){
    localStorage.removeItem('currentTeacherIndex');
    window.location.href = 'index.html';
}

// Initial load
renderStudents();
</script>

</body>
</html>
