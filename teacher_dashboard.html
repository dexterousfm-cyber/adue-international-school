<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard - ADUE Portal</title>
<link rel="stylesheet" href="styles.css">
<style>
.header { background:#722F37; padding:20px; color:white; display:flex; align-items:center; justify-content:space-between; }
.header img { width:120px; height:120px; border-radius:50%; border:3px solid white; margin-right:20px; }
#welcome { color:white; font-size:24px; margin:0; }
.logout-btn { background:white; color:#722F37; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:bold; }
.logout-btn:hover { opacity:0.9; }
.dashboard-buttons { margin:20px 0; }
.dashboard-buttons button { padding:10px 20px; margin-right:10px; border:none; background:#722F37; color:white; border-radius:6px; cursor:pointer; font-size:16px; }
.dashboard-buttons button:hover { opacity:0.9; }
table { width:100%; border-collapse:collapse; margin-top:20px; }
th, td { border:1px solid #ccc; padding:10px; text-align:center; }
th { background:#eee; }
img { border-radius:50%; }
button.edit-btn { padding:5px 10px; border:none; background:#722F37; color:white; cursor:pointer; border-radius:5px; margin:2px; }
button.edit-btn:hover { opacity:0.9; }
</style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center;">
        <img id="teacherPic" src="default-teacher.png" alt="Teacher Picture">
        <div>
            <h1 id="welcome">Welcome, Teacher</h1>
            <div id="teacherEmailDisplay"></div>
        </div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="dashboard-buttons">
    <button onclick="registerStudent()">Register Student</button>
</div>

<h2>All Students</h2>
<table id="studentsTable">
<thead>
<tr>
<th>Picture</th><th>Name</th><th>Email</th><th>Student ID</th><th>Class</th><th>Year</th><th>Result</th><th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
let students = JSON.parse(localStorage.getItem('students')) || [];
let currentTeacherEmail = localStorage.getItem('currentTeacherEmail');
let currentTeacher = teachers.find(t => t.email === currentTeacherEmail);

if(currentTeacher){
    document.getElementById('welcome').innerText = "Welcome, " + currentTeacher.name;
    document.getElementById('teacherEmailDisplay').innerText = currentTeacher.email;
    document.getElementById('teacherPic').src = currentTeacher.profilePicture || "default-teacher.png";
}

function renderStudents(){
    let tbody = document.querySelector("#studentsTable tbody");
    tbody.innerHTML = "";
    students.forEach((s,index)=>{
        tbody.innerHTML += `<tr>
            <td><img src="${s.profilePicture || 'default-student.png'}" width="70" height="70"></td>
            <td>${s.name}</td>
            <td>${s.email}</td>
            <td>${s.studentID}</td>
            <td>${s.studentClass}</td>
            <td>${s.studentYear}</td>
            <td>${s.result || ''}</td>
            <td><button class="edit-btn" onclick="editResult(${index})">Edit Result</button></td>
        </tr>`;
    });
}
renderStudents();

function registerStudent(){
    let name = prompt("Student Full Name:");
    if(!name) return;
    let email = prompt("Student Email:");
    if(!email) return;
    let studentID = prompt("Student ID:");
    if(!studentID) return;
    let studentClass = prompt("Class:");
    if(!studentClass) return;
    let studentYear = prompt("Year:");
    if(!studentYear) return;
    let password = prompt("Password:");
    if(!password) return;
    let picture = prompt("Profile Picture URL (optional):");

    students.push({name,email,studentID,studentClass,studentYear,password,result:'',profilePicture: picture || null, subjects: []});
    localStorage.setItem('students', JSON.stringify(students));
    alert("Student registered successfully!");
    renderStudents();
}

function editResult(index){
    let newResult = prompt("Enter result for " + students[index].name, students[index].result || '');
    if(newResult !== null){
        students[index].result = newResult;
        localStorage.setItem('students', JSON.stringify(students));
        renderStudents();
    }
}

function logout(){
    localStorage.removeItem('currentTeacherEmail');
    window.location.href="index.html";
}
</script>
</body>
</html>
