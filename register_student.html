<!DOCTYPE html>
<html>
<head>
    <title>Register Student - ADUE Portal</title>
</head>
<body>

<h1>Register Student (Admin Only)</h1>

<input type="text" id="name" placeholder="Student Name"><br>
<input type="email" id="email" placeholder="Student Email"><br>
<input type="password" id="password" placeholder="Student Password"><br>
<input type="text" id="class" placeholder="Class"><br>
<button onclick="registerStudent()">Register Student</button>

<script>
const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
if(!loggedInUser || loggedInUser.role !== "admin"){
    alert("Only admins can register students!");
    window.location.href = "dashboard.html";
}

function registerStudent(){
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const className = document.getElementById("class").value;

    if(!name || !email || !password || !className){
        alert("Please fill all fields");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];
    users.push({name, email, password, role:"student", class: className});
    localStorage.setItem("users", JSON.stringify(users));

    alert("Student registered successfully!");
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";
    document.getElementById("class").value = "";
}
</script>

<a href="dashboard.html">Back to Dashboard</a>

</body>
</html>
