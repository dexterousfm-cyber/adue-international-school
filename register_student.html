<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Student - ADUE Portal</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Top header -->
<div class="header">
    <div class="header-content">
        <img src="logo-new.png" alt="Header Logo" class="logo-header">
        <h1>ADUE Admin Dashboard</h1>
    </div>
</div>

<!-- Registration form wrapper -->
<div class="form-wrapper">
    <div class="form-box">
        <h2>Register New Student</h2>

        <form id="studentForm">
            <input type="text" id="studentName" placeholder="Full Name" required>
            <input type="email" id="studentEmail" placeholder="Email Address" required>
            <input type="text" id="studentID" placeholder="Student ID" required>
            <input type="text" id="studentClass" placeholder="Class (e.g., 10-A)" required>
            <input type="text" id="studentYear" placeholder="Year (e.g., Year 10)" required>
            <input type="password" id="studentPassword" placeholder="Password" required>
            
            <button type="submit">Register Student</button>
        </form>

        <div class="info-text">
            Total Teachers Registered: <span id="totalTeachers">0</span><br>
            Total Students Registered: <span id="totalStudents">0</span>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
                                                    </html>
