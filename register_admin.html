<!DOCTYPE html>
<html>
<head>
    <title>Register Admin - ADUE Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; text-align:center; padding:50px; background:#f4f4f4; }
        input { padding:10px; margin:10px; width:250px; font-size:16px; }
        button { padding:10px 25px; font-size:16px; cursor:pointer; margin-top:10px; }
    </style>
</head>
<body>

<h1>Register as Admin</h1>

<input type="email" id="email" placeholder="Email" readonly><br>
<input type="password" id="password" placeholder="Set your password"><br>
<button onclick="registerAdmin()">Register</button>

<script>
// Get email from invite link
const urlParams = new URLSearchParams(window.location.search);
const invitedEmail = urlParams.get('email');

if(!invitedEmail){
    alert("Invalid invite link!");
    window.location.href = "dashboard.html";
} else {
    document.getElementById("email").value = invitedEmail;
}

function registerAdmin(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value.trim();

    if(!password){
        alert("Please set your password!");
        return;
    }

    // Get existing users
    let users = JSON.parse(localStorage.getItem("users")) || [];

    // Check if email already exists
    if(users.find(u => u.email.toLowerCase() === email.toLowerCase())){
        alert("An account with this email already exists!");
        return;
    }

    // Add new admin
    users.push({
        email: email,
        password: password,
        role: "admin",
        name: "" // optional: admin name can be added later
    });

    localStorage.setItem("users", JSON.stringify(users));

    alert("Registration successful! You can now login.");
    window.location.href = "login.html";
}
</script>

</body>
</html>
