<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - ADUE Portal</title>
    <style>
        body { font-family: Arial, sans-serif; background:#f4f4f4; text-align:center; padding:20px;}
        .card { display:inline-block; background:white; padding:20px; margin:10px; border-radius:10px; width:200px; }
        a { text-decoration:none; color:blue; }
    </style>
</head>
<body>

<script>
const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
if(!loggedInUser) window.location.href = "login.html";

function logout(){
    localStorage.removeItem("loggedInUser");
    window.location.href = "login.html";
}
</script>

<h1>Welcome, <span id="username"></span></h1>

<div class="card">
    <h3>Students</h3>
    <p>View Students</p>
    <a href="students.html">Go</a>
</div>

<div class="card">
    <h3>Teachers</h3>
    <p>View Teachers</p>
    <a href="teachers.html">Go</a>
</div>

<div class="card" id="registerStudentCard" style="display:none;">
    <h3>Register Student</h3>
    <p>Add new student</p>
    <a href="register_student.html">Go</a>
</div>

<br><br>
<button onclick="logout()">Logout</button>

<script>
document.getElementById("username").innerText = loggedInUser.name;

// Show "Register Student" only for admin
if(loggedInUser.role === "admin"){
    document.getElementById("registerStudentCard").style.display = "inline-block";
}
</script>

</body>
</html>
