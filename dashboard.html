<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - School System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .nav {
            text-align: center;
            padding: 10px;
            background: #333;
        }
        .nav a {
            color: white;
            margin: 0 15px;
            font-weight: bold;
            text-decoration: none;
        }
        .nav a.current {
            text-decoration: underline;
        }
        .cards-container {
            width: 50%;
            margin: 50px auto;
            display: flex;
            justify-content: space-around;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 40%;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .card p {
            font-size: 24px;
            font-weight: bold;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: #333;
            color: white;
            margin-top: 50px;
        }
    </style>
</head>
    <body>

<script>
if (!localStorage.getItem("loggedInUser")) {
    window.location.href = "index.html";
}
</script>
    <!-- Navigation Bar -->
    <div class="nav">
        <a href="dashboard.html" class="current">Dashboard</a>
        <a href="students.html">Students</a>
        <a href="teachers.html">Teachers</a>
    </div>

    <!-- Dashboard Cards -->
    <div class="cards-container">
        <div class="card">
            <h2>Total Students</h2>
            <p id="studentCount">0</p>
            <a href="students.html">Go to Students</a>
        </div>
        <div class="card">
            <h2>Total Teachers</h2>
            <p id="teacherCount">0</p>
            <a href="teachers.html">Go to Teachers</a>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        School Management System by Abiola Ridwan Olamilekan
    </footer>

    <!-- JavaScript for counting rows -->
    <script>
        function updateCounts() {
            var studentTable = document.getElementById("studentTable");
            var teacherTable = document.getElementById("teacherTable");
            var studentCount = studentTable ? studentTable.rows.length - 1 : 0;
            var teacherCount = teacherTable ? teacherTable.rows.length - 1 : 0;
            document.getElementById("studentCount").innerText = studentCount;
            document.getElementById("teacherCount").innerText = teacherCount;
        }
        window.onload = updateCounts;
    </script>

</body>
</html>
