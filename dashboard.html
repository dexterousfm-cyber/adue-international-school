<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - ADUE Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; text-align:center; background:#f4f4f4; }
        .nav a { margin:0 15px; text-decoration:none; font-weight:bold; color:#333; }
        .card { display:inline-block; background:#fff; padding:20px; margin:20px; border-radius:10px; }
    </style>
</head>
<body>

<div class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="students.html">Students</a>
    <a href="teachers.html">Teachers</a>
    <a href="index.html" onclick="logout()">Logout</a>
</div>

<h1>Dashboard</h1>

<div class="card">
    <h2>Total Students</h2>
    <p id="studentCount">0</p>
</div>
<div class="card">
    <h2>Total Teachers</h2>
    <p id="teacherCount">0</p>
</div>

<script>
// Check login
let loggedIn = JSON.parse(localStorage.getItem("loggedInUser"));
if(!loggedIn){ window.location.href="login.html"; }

// Count students and teachers
let users = JSON.parse(localStorage.getItem("users")) || [];
document.getElementById("studentCount").innerText = users.filter(u=>u.role==="student").length;
document.getElementById("teacherCount").innerText = users.filter(u=>u.role==="teacher").length;

function logout(){
    localStorage.removeItem("loggedInUser");
    window.location.href="index.html";
}
</script>

</body>
</html>
