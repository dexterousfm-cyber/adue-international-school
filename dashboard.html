<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>Admin Dashboard</h1>

<h3>All Teachers</h3>
<div id="teachers"></div>

<h3>All Students</h3>
<div id="students"></div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];

// Show teachers
let teacherDiv = document.getElementById("teachers");
let teachers = users.filter(u => u.role === "teacher");

teachers.forEach(t => {
    teacherDiv.innerHTML += `<p>${t.name} - ${t.subject}</p>`;
});

// Show students
let studentDiv = document.getElementById("students");
let students = users.filter(u => u.role === "student");

students.forEach(s => {
    let teacher = users.find(t => t.email === s.teacherEmail);

    studentDiv.innerHTML += `
    <p>
    ${s.name} 
    - ${s.class} 
    - ${s.subject} 
    - Teacher: ${teacher ? teacher.name : "None"}
    </p>`;
});
</script>

</body>
</html>
