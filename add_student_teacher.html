<!DOCTYPE html>
<html>
<head>
    <title>Add Student - Teacher Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; text-align:center; padding:50px; background:#f4f4f4; }
        input { padding:10px; margin:10px; width:250px; font-size:16px; }
        button { padding:10px 25px; font-size:16px; cursor:pointer; margin-top:10px; }
    </style>
</head>
<body>

<h1>Add Student</h1>

<input type="text" id="studentName" placeholder="Student Name"><br>
<input type="email" id="studentEmail" placeholder="Student Email"><br>
<input type="password" id="studentPassword" placeholder="Student Password"><br>
<button onclick="addStudent()">Add Student</button>
<button onclick="window.location.href='dashboard.html'">Back to Dashboard</button>

<script>
// Get logged-in teacher
let loggedIn = JSON.parse(localStorage.getItem("loggedInUser"));
if(!loggedIn || loggedIn.role !== "teacher"){
    alert("Access denied!");
    window.location.href="login.html";
}

function addStudent(){
    const name = document.getElementById("studentName").value.trim();
    const email = document.getElementById("studentEmail").value.trim();
    const password = document.getElementById("studentPassword").value;

    if(!name || !email || !password){
        alert("Please fill in all fields!");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    if(users.find(u => u.email.toLowerCase() === email.toLowerCase())){
        alert("A user with this email already exists!");
        return;
    }

    // Add student with teacherEmail as logged-in teacher
    users.push({
        name,
        email,
        password,
        role: "student",
        teacherEmail: loggedIn.email
    });

    localStorage.setItem("users", JSON.stringify(users));

    alert("Student added successfully!");
    document.getElementById("studentName").value = "";
    document.getElementById("studentEmail").value = "";
    document.getElementById("studentPassword").value = "";
}
</script>

</body>
</html>
