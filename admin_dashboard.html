<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADUE Admin Dashboard</title>
<link rel="stylesheet" href="styles.css">
<style>
/* Header styling */
.header {
    background-color: #722F37; /* wine color */
    padding: 20px;
    text-align: center;
    color: white; /* ADUE Admin Dashboard text in white */
}
.header img {
    height: 50px;
    vertical-align: middle;
    margin-right: 15px;
}
.header h1 {
    display: inline;
    font-size: 24px;
    vertical-align: middle;
}

/* Dashboard wrapper */
.dashboard-wrapper {
    max-width: 1000px;
    margin: 30px auto;
    padding: 20px;
}

/* Table styling */
table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 40px;
}
table, th, td {
    border: 1px solid #ccc;
}
th, td {
    padding: 12px;
    text-align: left;
}
th {
    background-color: #722F37;
    color: white;
}
td button {
    background-color: #722F37;
    color: white;
    border: none;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
}
td button:hover {
    opacity: 0.9;
}

/* Add button */
.add-btn {
    background-color: #722F37;
    color: white;
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin-bottom: 15px;
}
.add-btn:hover {
    opacity: 0.9;
}

/* Logout */
.logout-btn {
    background-color: #ccc;
    color: #000;
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    float: right;
}
.logout-btn:hover {
    opacity: 0.9;
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <img src="logo-new.png" alt="Logo">
    <h1>ADUE Admin Dashboard</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="dashboard-wrapper">
    <!-- Teachers Section -->
    <h2>Teachers</h2>
    <button class="add-btn" onclick="window.location.href='register_teacher.html'">Register Teacher</button>
    <table id="teachersTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Teacher ID</th>
                <th>Department</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- Dynamic content -->
        </tbody>
    </table>

    <!-- Students Section -->
    <h2>Students</h2>
    <button class="add-btn" onclick="window.location.href='register_student.html'">Register Student</button>
    <table id="studentsTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Student ID</th>
                <th>Class</th>
                <th>Year</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- Dynamic content -->
        </tbody>
    </table>
</div>

<script>
// Fetch teachers and students
let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
let students = JSON.parse(localStorage.getItem('students')) || [];

// Function to render teachers table
function renderTeachers() {
    const tbody = document.getElementById('teachersTable').getElementsByTagName('tbody')[0];
    tbody.innerHTML = '';
    teachers.forEach((t, index) => {
        const row = tbody.insertRow();
        row.innerHTML = `
            <td>${index + 1}</td>
            <td>${t.name}</td>
            <td>${t.email}</td>
            <td>${t.teacherID}</td>
            <td>${t.department}</td>
            <td>
                <button onclick="editTeacher(${index})">Edit</button>
                <button onclick="deleteTeacher(${index})">Delete</button>
            </td>
        `;
    });
}

// Function to render students table
function renderStudents() {
    const tbody = document.getElementById('studentsTable').getElementsByTagName('tbody')[0];
    tbody.innerHTML = '';
    students.forEach((s, index) => {
        const row = tbody.insertRow();
        row.innerHTML = `
            <td>${index + 1}</td>
            <td>${s.name}</td>
            <td>${s.email}</td>
            <td>${s.studentID}</td>
            <td>${s.class}</td>
            <td>${s.year}</td>
            <td>
                <button onclick="editStudent(${index})">Edit</button>
                <button onclick="deleteStudent(${index})">Delete</button>
            </td>
        `;
    });
}

// Delete functions
function deleteTeacher(index) {
    if(confirm("Are you sure you want to delete this teacher?")) {
        teachers.splice(index, 1);
        localStorage.setItem('teachers', JSON.stringify(teachers));
        renderTeachers();
    }
}

function deleteStudent(index) {
    if(confirm("Are you sure you want to delete this student?")) {
        students.splice(index, 1);
        localStorage.setItem('students', JSON.stringify(students));
        renderStudents();
    }
}

// Edit placeholders (implement later)
function editTeacher(index){
    alert("Edit functionality can be implemented here.");
}
function editStudent(index){
    alert("Edit functionality can be implemented here.");
}

// Logout
function logout(){
    window.location.href = 'index.html';
}

// Initial render
renderTeachers();
renderStudents();
</script>

</body>
</html>
