<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADUE Admin Dashboard</title>
<link rel="stylesheet" href="styles.css">
<style>
/* Header styling */
.header {
    background-color: #722F37; /* wine color */
    padding: 20px;
    text-align: center;
    color: white;
}
.header img {
    height: 50px;
    vertical-align: middle;
    margin-right: 15px;
}
.header h1 {
    display: inline;
    font-size: 24px;
    vertical-align: middle;
}

/* Dashboard cards container */
.dashboard-stats {
    display: flex;
    justify-content: space-around;
    margin: 30px 10px;
    flex-wrap: wrap;
}

/* Individual stat card */
.stat-card {
    background-color: #fff; /* white card */
    border-radius: 12px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    padding: 30px 20px;
    text-align: center;
    width: 200px;
    margin: 10px;
    transition: transform 0.2s;
}
.stat-card:hover {
    transform: translateY(-5px);
}
.stat-card h2 {
    font-size: 18px;
    margin-bottom: 10px;
    color: #722F37; /* wine-colored titles */
}
.stat-card p {
    font-size: 36px;
    font-weight: bold;
    color: #333; /* dark number color for contrast */
}

/* Quick action buttons */
.dashboard-actions {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 40px 0;
}
.dashboard-actions button {
    padding: 12px 25px;
    background-color: #722F37; /* wine color */
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}
.dashboard-actions button:hover {
    opacity: 0.9;
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <img src="logo-new.png" alt="Logo">
    <h1>ADUE Admin Dashboard</h1>
</div>

<!-- Dashboard Stats -->
<div class="dashboard-stats">
    <div class="stat-card">
        <h2>Total Teachers Registered</h2>
        <p id="totalTeachers">0</p>
    </div>
    <div class="stat-card">
        <h2>Total Students Registered</h2>
        <p id="totalStudents">0</p>
    </div>
</div>

<!-- Quick Links -->
<div class="dashboard-actions">
    <button onclick="location.href='register_teacher.html'">Register Teacher</button>
    <button onclick="location.href='register_student.html'">Register Student</button>
</div>

<script>
// Load saved totals from localStorage or initialize to 0
let totalTeachers = localStorage.getItem('totalTeachers') ? parseInt(localStorage.getItem('totalTeachers')) : 0;
let totalStudents = localStorage.getItem('totalStudents') ? parseInt(localStorage.getItem('totalStudents')) : 0;

// Function to update dashboard numbers
function updateDashboard() {
    document.getElementById('totalTeachers').innerText = totalTeachers;
    document.getElementById('totalStudents').innerText = totalStudents;
}

// Functions to increment totals when registering teacher/student
function addTeacher() {
    totalTeachers++;
    localStorage.setItem('totalTeachers', totalTeachers);
    updateDashboard();
}

function addStudent() {
    totalStudents++;
    localStorage.setItem('totalStudents', totalStudents);
    updateDashboard();
}

// Initial render
updateDashboard();
</script>

</body>
</html>
