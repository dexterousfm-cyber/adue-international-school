<div class="register-buttons">
    <button class="action-btn" onclick="window.location.href='register_teacher.html'">Register Teacher</button>
    <button class="action-btn" onclick="window.location.href='register_student.html'">Register Student</button>
</div>

<!-- Toggle Buttons -->
<div class="toggle-buttons" style="margin:20px 0;">
    <button class="action-btn" onclick="showTable('teachers')">Teachers</button>
    <button class="action-btn" onclick="showTable('students')">Students</button>
</div>

<!-- Tables -->
<table id="teachersTable">
    <tr>
        <th>Picture</th>
        <th>Name</th>
        <th>Email</th>
        <th>Teacher ID</th>
        <th>Department</th>
        <th>Edit</th>
    </tr>
</table>

<table id="studentsTable" style="display:none;">
    <tr>
        <th>Picture</th>
        <th>Name</th>
        <th>Email</th>
        <th>Student ID</th>
        <th>Class</th>
        <th>Year</th>
        <th>Edit</th>
    </tr>
</table>

<script>
// Toggle between tables
function showTable(table) {
    document.getElementById('teachersTable').style.display = (table === 'teachers') ? '' : 'none';
    document.getElementById('studentsTable').style.display = (table === 'students') ? '' : 'none';
}
</script>
