<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADUE Portal - Admin Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>ADUE Dashboard</h1>
    <button id="logoutBtn">Logout</button>

    <h2>Add New Admin</h2>
    <form id="addAdminForm">
        <label for="adminName">Full Name:</label>
        <input type="text" id="adminName" placeholder="Enter full name" required>

        <label for="adminEmail">Email:</label>
        <input type="email" id="adminEmail" placeholder="Enter email" required>

        <label for="adminPassword">Password:</label>
        <input type="password" id="adminPassword" placeholder="Enter password" required>

        <button type="submit">Add Admin</button>
    </form>

    <h2>All Teachers</h2>
    <table id="teachersTable" border="1" cellpadding="5">
        <thead>
            <tr>
                <th>Full Name</th>
                <th>Email</th>
                <th>Subjects</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="3">No teachers yet</td></tr>
        </tbody>
    </table>

    <h2>All Students</h2>
    <table id="studentsTable" border="1" cellpadding="5">
        <thead>
            <tr>
                <th>Full Name</th>
                <th>Email</th>
                <th>Class</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="3">No students yet</td></tr>
        </tbody>
    </table>
</div>

<script src="script.js"></script>
</body>
</html>
