<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* HEADER */
.header {
    background: #800000;
    color: white;
    padding: 15px;
    text-align: center;
}

/* BUTTON AREA */
.actions {
    text-align: center;
    margin: 20px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    background: #800000;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #a00000;
}

/* CARD TABLE */
.card {
    width: 90%;
    margin: auto;
    background: white;
    border-radius: 10px;
    padding: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #ccc;
    text-align: center;
}

th {
    background: #800000;
    color: white;
}
</style>
</head>

<body>

<div class="header">
    <h2>Admin Dashboard</h2>
</div>

<div class="actions">
    <button onclick="showTeachers()">Show Teachers</button>
    <button onclick="showStudents()">Show Students</button>
    <button onclick="registerTeacher()">Add Teacher</button>
    <button onclick="registerStudent()">Add Student</button>
    <button onclick="logout()">Logout</button>
</div>

<div class="card">
    <table id="table"></table>
</div>

<script>

// -------- GET DATA --------
function getTeachers(){
    return JSON.parse(localStorage.getItem('teachers')) || [];
}

function getStudents(){
    return JSON.parse(localStorage.getItem('students')) || [];
}

// -------- SHOW TEACHERS --------
function showTeachers(){
    let teachers = getTeachers();

    let html = `
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Teacher ID</th>
    </tr>
    `;

    teachers.forEach(t=>{
        html += `
        <tr>
            <td>${t.name}</td>
            <td>${t.email}</td>
            <td>${t.teacherID}</td>
        </tr>
        `;
    });

    document.getElementById("table").innerHTML = html;
}

// -------- SHOW STUDENTS --------
function showStudents(){
    let students = getStudents();

    let html = `
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Student ID</th>
    </tr>
    `;

    students.forEach(s=>{
        html += `
        <tr>
            <td>${s.name}</td>
            <td>${s.email}</td>
            <td>${s.studentID}</td>
        </tr>
        `;
    });

    document.getElementById("table").innerHTML = html;
}

// -------- REGISTER TEACHER --------
function registerTeacher(){
    let teachers = getTeachers();

    let name = prompt("Teacher Name:");
    let email = prompt("Email:");
    let id = prompt("Teacher ID:");
    let password = prompt("Password:");

    if(!name || !email || !id || !password){
        alert("All fields required!");
        return;
    }

    teachers.push({name,email,teacherID:id,password});
    localStorage.setItem('teachers', JSON.stringify(teachers));

    alert("Teacher Added");
    showTeachers();
}

// -------- REGISTER STUDENT --------
function registerStudent(){
    let students = getStudents();

    let name = prompt("Student Name:");
    let email = prompt("Email:");
    let id = prompt("Student ID:");
    let password = prompt("Password:");

    if(!name || !email || !id || !password){
        alert("All fields required!");
        return;
    }

    students.push({name,email,studentID:id,password});
    localStorage.setItem('students', JSON.stringify(students));

    alert("Student Added");
    showStudents();
}

// -------- LOGOUT --------
function logout(){
    window.location.href = "index.html";
}

// -------- INITIAL LOAD --------
showTeachers();

</script>

</body>
</html>
