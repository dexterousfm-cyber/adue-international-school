<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADUE Admin Dashboard</title>
<link rel="stylesheet" href="styles.css">
<style>
/* Only added this to fix the header color */
.dashboard-header {
    color: white; /* ADUE Admin Dashboard text in white */
}
</style>
</head>
<body>

<!-- Top header -->
<div class="header">
    <div class="header-content">
        <img src="logo-new.png" alt="Header Logo" class="logo-header">
        <h1 class="dashboard-header">ADUE Admin Dashboard</h1>
    </div>
</div>

<!-- Dashboard stats -->
<div class="dashboard-stats">
    <div class="stat-card">
        <h2>Total Teachers</h2>
        <p id="totalTeachers">0</p>
    </div>
    <div class="stat-card">
        <h2>Total Students</h2>
        <p id="totalStudents">0</p>
    </div>
</div>

<!-- Quick links -->
<div class="dashboard-actions">
    <button onclick="location.href='register_teacher.html'">Register Teacher</button>
    <button onclick="location.href='register_student.html'">Register Student</button>
</div>

<script>
// Initialize totals (start at 0)
let totalTeachers = 0;
let totalStudents = 0;

// Function to update totals in the dashboard
function updateDashboard() {
    document.getElementById('totalTeachers').innerText = totalTeachers;
    document.getElementById('totalStudents').innerText = totalStudents;
}

// Example functions to increment counts when a teacher/student is registered
function addTeacher() {
    totalTeachers++;
    updateDashboard();
}

function addStudent() {
    totalStudents++;
    updateDashboard();
}

// Initial render
updateDashboard();
</script>

</body>
</html>
