<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>Welcome, <span id="studentName"></span></h1>
<img id="studentPic" src="default.png" width="100" style="border-radius:50%">

<h2>Update Profile Picture</h2>
<input type="file" id="updatePictureInput" accept="image/*">

<h2>Select Subjects</h2>
<select id="subjectsSelect" multiple>
    <option>Math</option>
    <option>English</option>
    <option>Science</option>
    <option>History</option>
</select>

<script>
let students = JSON.parse(localStorage.getItem('students')) || [];
let currentStudentIndex = parseInt(localStorage.getItem("currentStudentIndex"));
let student = students[currentStudentIndex];

document.getElementById("studentName").innerText = student.name;
document.getElementById("studentPic").src = student.profilePicture || 'default.png';

// Update picture
document.getElementById("updatePictureInput").addEventListener("change", function(){
    if(this.files.length>0){
        const reader = new FileReader();
        reader.onload = function(){
            student.profilePicture = reader.result;
            students[currentStudentIndex] = student;
            localStorage.setItem("students", JSON.stringify(students));
            document.getElementById("studentPic").src = reader.result;
        }
        reader.readAsDataURL(this.files[0]);
    }
});
</script>
</body>
</html>
