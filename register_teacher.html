<!DOCTYPE html>
<html>
<head>
    <title>Register Teacher - ADUE Portal</title>
    <style>
        body { font-family: Arial; max-width:400px; margin:50px auto; padding:20px; text-align:center; }
        input { width:90%; padding:8px; margin:10px 0; }
        button { width:95%; padding:10px; background-color:#4CAF50; color:white; border:none; cursor:pointer; }
        button:hover { background-color:#45a049; }
        #status { color:green; }
    </style>
</head>
<body>

<h2>Teacher Registration</h2>

<input type="text" id="name" placeholder="Full Name"><br>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="registerTeacher()">Register</button>

<p id="status"></p>
<p>Already have an account? <a href="index.html">Login here</a></p>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];

function registerTeacher(){
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();
    if(!name||!email||!password){ alert("Fill all fields"); return; }
    if(users.find(u => u.email===email)){ alert("Email already registered"); return; }

    let teacher={name,email,password,role:"teacher"};
    users.push(teacher);
    localStorage.setItem("users",JSON.stringify(users));
    document.getElementById("status").innerText="Teacher registered successfully! Redirecting to login...";
    setTimeout(()=>{ window.location.href="index.html"; },1500);
}
</script>

</body>
</html>
