<!DOCTYPE html>
<html>
<head>
    <title>Teacher Registration</title>
</head>
<body>

<h2>Teacher Registration</h2>

<input type="text" id="teacherName" placeholder="Full Name"><br><br>
<input type="email" id="teacherEmail" placeholder="Email"><br><br>
<input type="password" id="teacherPassword" placeholder="Password"><br><br>

<select id="teacherSubject">
    <option value="">Select Subject</option>
    <option>Math</option>
    <option>English</option>
    <option>Science</option>
</select><br><br>

<button onclick="registerTeacher()">Register</button>

<p id="status"></p>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];

function registerTeacher(){
    let name = document.getElementById("teacherName").value;
    let email = document.getElementById("teacherEmail").value;
    let password = document.getElementById("teacherPassword").value;
    let subject = document.getElementById("teacherSubject").value;

    users.push({
        name: name,
        email: email,
        password: password,
        role: "teacher",
        subject: subject
    });

    localStorage.setItem("users", JSON.stringify(users));

    document.getElementById("status").innerText = "Teacher Registered!";
}
</script>

</body>
</html>
