<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Student - ADUE Portal</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Top header -->
<div class="header">
    <div class="header-content">
        <img src="logo-new.png" alt="Header Logo" class="logo-header">
        <h1>ADUE Admin Dashboard</h1>
    </div>
</div>

<!-- Centered registration box -->
<div class="registration-wrapper">
    <div class="registration-box">
        <!-- Box header -->
        <img src="login-logo.png" alt="Registration Logo" class="logo-box">
        <h2>Register New Student</h2>

        <form id="registerStudentForm">
            <!-- Student Full Name -->
            <input type="text" id="studentName" placeholder="Full Name" required>

            <!-- Student ID -->
            <input type="text" id="studentID" placeholder="Student ID" required>

            <!-- Email -->
            <input type="email" id="studentEmail" placeholder="Email Address" required>

            <!-- Year -->
            <input type="text" id="studentYear" placeholder="Year (e.g., Year 10)" required>

            <!-- Class -->
            <input type="text" id="studentClass" placeholder="Class (e.g., 10-A)" required>

            <button type="submit">Register Student</button>
        </form>

        <div id="successMsg" class="success-message" style="display:none;">
            Student Registered Successfully!
        </div>
    </div>
</div>

<script>
    // Register Student Form Handling
    const registerStudentForm = document.getElementById('registerStudentForm');
    const successMsg = document.getElementById('successMsg');

    registerStudentForm.addEventListener('submit', function(e){
        e.preventDefault();

        const studentData = {
            name: document.getElementById('studentName').value,
            id: document.getElementById('studentID').value,
            email: document.getElementById('studentEmail').value,
            year: document.getElementById('studentYear').value,
            class: document.getElementById('studentClass').value
        };

        // Save to localStorage (replace with database later)
        let students = JSON.parse(localStorage.getItem('students')) || [];
        students.push(studentData);
        localStorage.setItem('students', JSON.stringify(students));

        // Reset form and show success
        registerStudentForm.reset();
        successMsg.style.display = "block";

        setTimeout(() => {
            successMsg.style.display = "none";
        }, 3000);
    });
</script>

</body>
</html>
