<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Teacher</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h2>Register Teacher</h2>
  <form id="teacherForm">
    <input type="text" id="teacherName" placeholder="Full Name" required>
    <input type="email" id="teacherEmail" placeholder="Email" required>
    <input type="text" id="teacherID" placeholder="Teacher ID" required>
    <input type="password" id="teacherPassword" placeholder="Password" required>
    <input type="file" id="teacherPic">
    <button type="submit">Register Teacher</button>
  </form>
</div>

<script>
document.getElementById("teacherForm").addEventListener("submit", function(e){
    e.preventDefault();

    let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
    
    let name = document.getElementById("teacherName").value;
    let email = document.getElementById("teacherEmail").value;
    let teacherID = document.getElementById("teacherID").value;
    let password = document.getElementById("teacherPassword").value;
    let file = document.getElementById("teacherPic").files[0];

    if (!name || !email || !teacherID || !password) {
        alert("All fields are required!");
        return;
    }

    function saveTeacher(pic){
        teachers.push({name,email,teacherID,password,profilePicture: pic || "teacher.png"});
        localStorage.setItem('teachers', JSON.stringify(teachers));
        alert("Teacher registered successfully!");
        document.getElementById("teacherForm").reset();
    }

    if(file){
        let reader = new FileReader();
        reader.onload = function(e){
            saveTeacher(e.target.result);
        }
        reader.readAsDataURL(file);
    } else {
        saveTeacher();
    }
});
</script>

</body>
</html>
