<!DOCTYPE html>
<html>
<head>
    <title>ADUE Portal Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; text-align:center; padding-top:50px; background:#f4f4f4; }
        input { padding:10px; margin:10px; width:250px; font-size:16px; }
        button { padding:10px 25px; font-size:16px; cursor:pointer; }
    </style>
</head>
<body>

<h1>Login to ADUE Portal</h1>

<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<script>
// Step 1: Clear any old users and sessions
localStorage.removeItem("users");
localStorage.removeItem("loggedInUser");
localStorage.removeItem("teacherInvites");

// Step 2: Force-create admin account
let users = [
    {
        name: "Admin User",
        email: "dexterousfm@gmail.com",
        password: "Ayomide@123",
        role: "admin"
    }
];
localStorage.setItem("users", JSON.stringify(users));
console.log("Admin account created! Email: dexterousfm@gmail.com | Password: Ayomide@123");

// Step 3: Login function
function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];
    const user = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password);

    if(user){
        localStorage.setItem("loggedInUser", JSON.stringify(user));
        alert(`Welcome, ${user.name}!`);
        window.location.href = "dashboard.html";
    } else {
        alert("Invalid email or password");
    }
}
</script>

</body>
</html>
