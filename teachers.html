<!DOCTYPE html>
<html>
<head>
    <title>Teachers - ADUE Portal</title>
</head>
<body>
<h1>Teachers</h1>
<button onclick="window.location.href='dashboard.html'">Back to Dashboard</button>

<div id="teacherList"></div>

<script>
let loggedIn = JSON.parse(localStorage.getItem("loggedInUser"));
if(!loggedIn || loggedIn.role !== "admin"){ alert("Access denied!"); window.location.href="login.html"; }

let users = JSON.parse(localStorage.getItem("users")) || [];
let teachers = users.filter(u=>u.role==="teacher");

let div = document.getElementById("teacherList");
teachers.forEach(t=>{
    let p = document.createElement("p");
    p.innerText = `${t.name} | ${t.email}`;
    div.appendChild(p);
});
</script>

</body>
</html>
