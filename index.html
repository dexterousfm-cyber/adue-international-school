<script>
// Create default admin (only once)
if(!localStorage.getItem('admins')){
    localStorage.setItem('admins', JSON.stringify([
        {
            email: "admin@adue.com",
            password: "12345678",
            name: "Admin",
            profilePicture: "admin.png"
        }
    ]));
}

const loginForm = document.getElementById("loginForm");

loginForm.addEventListener("submit", function(e){
    e.preventDefault();

    const input = document.getElementById("userId").value.trim();
    const password = document.getElementById("password").value;

    let admins = JSON.parse(localStorage.getItem('admins')) || [];
    let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
    let students = JSON.parse(localStorage.getItem('students')) || [];

    // 🔥 DEBUG (so you see what's happening)
    console.log("Admins:", admins);
    console.log("Teachers:", teachers);
    console.log("Students:", students);

    // ✅ ADMIN LOGIN
    for(let i=0; i<admins.length; i++){
        if(admins[i].email === input && admins[i].password === password){
            localStorage.setItem("currentAdminIndex", i);
            window.location.href = "admin_dashboard.html";
            return;
        }
    }

    // ✅ TEACHER LOGIN
    for(let i=0; i<teachers.length; i++){
        if(
            (teachers[i].email === input || teachers[i].teacherID === input) &&
            teachers[i].password === password
        ){
            localStorage.setItem("currentTeacherIndex", i);
            window.location.href = "teacher_dashboard.html";
            return;
        }
    }

    // ✅ STUDENT LOGIN
    for(let i=0; i<students.length; i++){
        if(
            (students[i].email === input || students[i].studentID === input) &&
            students[i].password === password
        ){
            localStorage.setItem("currentStudentIndex", i);
            window.location.href = "student_dashboard.html";
            return;
        }
    }

    alert("Invalid login details!");
});
</script>
