<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADUE Portal Login</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Top header -->
<div class="header">
    <div class="header-content">
        <img src="logo-new.png" alt="Header Logo" class="logo-header">
        <h1>ADUE International School</h1>
    </div>
</div>

<!-- Centered login box -->
<div class="login-wrapper">
    <div class="login-box">
        <img src="login-logo.png" alt="Login Box Logo" class="logo-box">

        <form id="loginForm">
            <input type="text" id="userId" placeholder="ID / Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <div class="links">
                <a href="#">Forgot Password?</a>
                <a href="#">Contact IT Support</a>
            </div>
        </form>
    </div>
</div>

<script>
    // Hard-coded admin & teacher credentials
    const credentials = [
        { email: "admin@adue.com", password: "12345678", role: "admin", redirect: "admin_dashboard.html" },
        { email: "phemmyallen1@gmail.com", password: "12345678", role: "teacher", redirect: "teacher_dashboard.html" }
    ];

    const loginForm = document.getElementById("loginForm");

    loginForm.addEventListener("submit", function(e) {
        e.preventDefault();

        const userId = document.getElementById("userId").value.trim();
        const password = document.getElementById("password").value.trim();

        // Fetch students from localStorage
        const students = JSON.parse(localStorage.getItem("students")) || [];

        // Check if user is admin/teacher
        let user = credentials.find(c => c.email === userId && c.password === password);

        // If not found, check if user is a student
        if(!user) {
            user = students.find(s => s.email === userId && s.password === password);
            if(user) user.redirect = "student_dashboard.html"; // redirect student
        }

        if(user) {
            // Save current logged-in user to localStorage
            localStorage.setItem("currentUser", JSON.stringify(user));
            alert("Login successful!");
            window.location.href = user.redirect;
        } else {
            alert("Invalid login credentials!");
        }
    });
</script>

</body>
</html>
