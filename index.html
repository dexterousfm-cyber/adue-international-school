<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADUE Portal Login</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Login Container -->
<div class="container">
    <!-- Portal Heading (optional if already in your design) -->
    <h1>ADUE Portal</h1>

    <!-- Login Form -->
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <!-- Note for users -->
    <p><strong>All accounts are created by Admin</strong></p>
</div>

<script src="script.js"></script>
</body>
</html>
