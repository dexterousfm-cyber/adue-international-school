<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADUE School Portal</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { 
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: linear-gradient(135deg, #800000 0%, #a00000 100%);
    min-height:100vh;
}

/* Header - Wine background */
.header { 
    background:#800000; 
    padding:20px 0; 
    text-align:center;
    border-bottom:3px solid #fff;
}
.header-content {
    display:flex; 
    align-items:center; 
    justify-content:center; 
    gap:20px;
}
.logo-header { 
    width:80px; 
    height:80px; 
    border-radius:50%; 
    border:3px solid white;
    object-fit:cover;
}
.header h1 { 
    color:white; 
    font-size:32px; 
    font-weight:600;
    text-shadow:2px 2px 4px rgba(0,0,0,0.3);
}

/* Login Wrapper */
.login-wrapper { 
    display:flex; 
    justify-content:center; 
    align-items:center; 
    min-height:calc(100vh - 150px);
    padding:40px 20px;
}

/* Login Box - White */
.login-box { 
    background:white; 
    padding:50px; 
    border-radius:15px; 
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
    width:100%; 
    max-width:450px;
    text-align:center;
    border-top:5px solid #800000;
}
.logo-box { 
    width:120px; 
    height:120px; 
    margin-bottom:30px;
    border-radius:50%;
    border:4px solid #800000;
    object-fit:cover;
}

/* Form Inputs */
#loginForm input { 
    width:100%; 
    padding:15px 20px; 
    margin-bottom:20px; 
    border:2px solid #e0e0e0; 
    border-radius:8px;
    font-size:16px;
    transition:all 0.3s;
}
#loginForm input:focus { 
    outline:none; 
    border-color:#800000;
    box-shadow:0 0 0 3px rgba(128,0,0,0.1);
}

/* Login Button - Wine */
#loginForm button { 
    width:100%; 
    padding:16px; 
    background:#800000; 
    color:white; 
    border:none; 
    border-radius:8px;
    font-size:18px; 
    font-weight:600; 
    cursor:pointer;
    transition:all 0.3s;
    text-transform:uppercase;
    letter-spacing:1px;
}
#loginForm button:hover { 
    background:#600000; 
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(128,0,0,0.3);
}

/* Links */
.links { 
    margin-top:25px; 
    padding-top:20px;
    border-top:1px solid #eee;
}
.links a { 
    color:#800000; 
    text-decoration:none; 
    font-weight:500;
    transition:color 0.3s;
}
.links a:hover { 
    color:#600000; 
    text-decoration:underline;
}

/* Error Message */
.error { 
    background:#ffebee; 
    color:#800000; 
    padding:12px; 
    border-radius:6px; 
    margin-bottom:20px; 
    display:none;
    border-left:4px solid #800000;
    font-weight:500;
}

/* Responsive */
@media(max-width:600px){
    .header h1 { font-size:24px; }
    .logo-header { width:60px; height:60px; }
    .login-box { padding:30px; }
    .logo-box { width:100px; height:100px; }
}
</style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <img src="logo-new.png" class="logo-header" alt="ADUE Logo">
        <h1>ADUE International School</h1>
    </div>
</div>

<div class="login-wrapper">
    <div class="login-box">
        <img src="login-logo.png" class="logo-box" alt="School Logo">
        
        <div class="error" id="errorMsg">Invalid login details!</div>

        <form id="loginForm">
            <input type="text" id="userId" placeholder="Email or ID" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login to School Portal</button>
            <div class="links">
                <a href="forgot_password.html">Forgot Password?</a>
            </div>
        </form>
    </div>
</div>

<script>
// Initialize data if not exists
if(!localStorage.getItem('admins')){
    localStorage.setItem('admins', JSON.stringify([
        { email: "admin@adue.com", password: "12345678", name: "Admin", profilePicture: "admin.png", id: "admin" }
    ]));
}
if(!localStorage.getItem('teachers')) {
    localStorage.setItem('teachers', JSON.stringify([
        { teacherID: "T001", email: "teacher@adue.com", password: "teacher123", name: "John Smith", department: "Science", subject: "Mathematics", firstName: "John", lastName: "Smith" }
    ]));
}
if(!localStorage.getItem('students')) localStorage.setItem('students', JSON.stringify([]));

// Load users
let admins = JSON.parse(localStorage.getItem('admins'));
let teachers = JSON.parse(localStorage.getItem('teachers'));
let students = JSON.parse(localStorage.getItem('students'));

// Login form
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    const input = document.getElementById("userId").value.trim();
    const password = document.getElementById("password").value;
    const errorMsg = document.getElementById("errorMsg");

    // Admin login
    for(let i=0; i<admins.length; i++){
        if(admins[i].email === input && admins[i].password === password){
            localStorage.setItem("currentAdminIndex", i);
            localStorage.setItem("currentUser", JSON.stringify({...admins[i], role: 'admin', index: i}));
            window.location.href = "admin_dashboard.html";
            return;
        }
    }

    // Teacher login
    for(let i=0; i<teachers.length; i++){
        if((teachers[i].email === input || teachers[i].teacherID === input) && teachers[i].password === password){
            localStorage.setItem("currentTeacherIndex", i);
            localStorage.setItem("currentUser", JSON.stringify({...teachers[i], role: 'teacher', index: i, id: teachers[i].teacherID}));
            window.location.href = "teacher_dashboard.html";
            return;
        }
    }

    // Student login
    for(let i=0; i<students.length; i++){
        if((students[i].email === input || students[i].studentID === input) && students[i].password === password){
            localStorage.setItem("currentStudentIndex", i);
            localStorage.setItem("currentUser", JSON.stringify({...students[i], role: 'student', index: i, id: students[i].studentID}));
            window.location.href = "student_dashboard.html";
            return;
        }
    }

    // Invalid login
    errorMsg.style.display = "block";
});
</script>

</body>
</html>
